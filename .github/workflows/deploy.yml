name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli

      - name: Build
        run: dx build --release

      - name: Add CNAME
        run: echo "scottyfermo.com" > target/dx/portfolio/release/web/public/CNAME

      - name: Add 404.html for SPA routing
        run: cp target/dx/portfolio/release/web/public/index.html target/dx/portfolio/release/web/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/portfolio/release/web/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

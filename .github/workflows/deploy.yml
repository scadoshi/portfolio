name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        # Caches the compiled dependency graph (native + wasm). Prunes
        # portfolio's own artifacts so the cache stays lean, and uses
        # restore-keys for partial hits when Cargo.lock changes — far
        # better hit rate than a raw target/ cache.
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Dioxus CLI
        # Fetches a prebuilt dx binary instead of compiling dioxus-cli from
        # source (which a `cargo install --force` would do on every run, ~minutes).
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.7.9

      - name: Build
        run: dx build --release --ssg --force-sequential

      - name: Add CNAME
        run: echo "scottyfermo.com" > target/dx/portfolio/release/web/public/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/portfolio/release/web/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
